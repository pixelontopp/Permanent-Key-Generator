<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Hub</title>

<style>
/* Modern Smooth Animations */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes pulseBorder {
    0% { border-color: #3b82f6; box-shadow: 0 0 10px #3b82f622; }
    50% { border-color: #22c55e; box-shadow: 0 0 20px #22c55e44; }
    100% { border-color: #3b82f6; box-shadow: 0 0 10px #3b82f622; }
}

@keyframes successPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
}

@keyframes shakeError {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#08111f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow: hidden;
}

.card{
    width:360px;
    background:#13233f;
    border-radius:18px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 40px #00000055, 0 0 30px #3b82f655;
    animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

h1{
    color:#6bbcff;
    margin-bottom:18px;
}

input[type="text"] {
    width: 100%;
    padding: 13px;
    margin-top: 10px;
    background: #0b1424;
    border: 1.5px solid #3b82f6;
    border-radius: 10px;
    color: white;
    text-align: center;
    font-size: 15px;
    font-weight: bold;
    outline: none;
    transition: all 0.25s ease;
}

input[type="text"]:focus {
    border-color: #6bbcff;
    box-shadow: 0 0 12px #6bbcff44;
}

button{
    width:100%;
    padding:13px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-size:16px;
    font-weight: bold;
    cursor:pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

button:hover:not(:disabled){
    transform: scale(1.03);
    background: #2563eb;
}

button:disabled {
    background: #1e293b;
    color: #64748b;
    cursor: not-allowed;
}
